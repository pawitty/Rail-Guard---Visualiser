<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RailGuard Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>RAILGUARD</h2>
  <div class="nav-links">
    <span>Dashboard</span>
    <span>Live</span>
    <span>Config</span>
    <span>Logs</span>
  </div>
  <div class="status">● SYSTEM ONLINE</div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Intelligent Track Misalignment Detection</h1>
  <p>Real-time monitoring using mmWave radar (IWR6843)</p>
</section>

<!-- KPI CARDS -->
<section class="cards">
  <div class="card">
    <h3>Temperature</h3>
    <p id="temp">32.5°C</p>
  </div>

  <div class="card">
    <h3>Rod 1</h3>
    <p id="rod1">0.18 m</p>
  </div>

  <div class="card">
    <h3>Rod 2</h3>
    <p id="rod2">0.23 m</p>
  </div>

  <div class="card">
    <h3>Rate</h3>
    <p>60 Hz</p>
  </div>
</section>

<!-- MAIN -->
<section class="main">

  <!-- RADAR -->
  <div class="panel">
    <h3>Radar View</h3>
    <canvas id="radarCanvas"></canvas>
  </div>

  <!-- CHART -->
  <div class="panel">
    <h3>Displacement</h3>
    <canvas id="chart"></canvas>
  </div>

</section>

<!-- LOGS -->
<section class="logs">
  <h3>Event Logs</h3>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Event</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody id="logTable"></tbody>
  </table>
</section>

<script src="script.js"></script>
</body>
</html>
